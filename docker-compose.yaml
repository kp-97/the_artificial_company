services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: the_artificial_company_backend
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - ./backend:/usr/local/app

  redis:
    image: redis:7-alpine
    container_name: the_artificial_company_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]