<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mock Dashboard</title>
<style>
  body { margin:0; font-family:Arial,sans-serif; display:flex; height:100vh;}
  .sidebar { width:200px; background:#2c3e50; color:#ecf0f1; padding:20px; box-sizing:border-box; }
  .sidebar h2 { margin-top:0; }
  .sidebar ul { list-style:none; padding:0; }
  .sidebar li { margin:15px 0; cursor:pointer; }
  .sidebar li:hover { text-decoration:underline; }
  .main { flex:1; background:#ecf0f1; padding:20px; box-sizing:border-box; overflow:auto; }
  .header { background:#34495e; color:#ecf0f1; padding:10px 20px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; margin-top:20px; }
  .card { background:white; padding:15px; border-radius:5px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
  .card h3 { margin-top:0; }
</style>
</head>
<body>
<div class="sidebar">
  <h2>Dashboard</h2>
  <ul>
    <li data-section="overview">Overview</li>
    <li data-section="sales">Sales</li>
    <li data-section="customers">Customers</li>
    <li data-section="reports">Reports</li>
  </ul>
</div>
<div class="main">
  <div class="header"><h1 id="section-title">Overview</h1></div>
  <div class="cards" id="cards-container"></div>
</div>

<script>
const data = {
  overview: [
    { title: 'Users', value: 1234 },
    { title: 'Revenue', value: '$12,345' },
    { title: 'Orders', value: 567 }
  ],
  sales: [
    { title: 'Online Sales', value: '$8,000' },
    { title: 'In-Store Sales', value: '$4,000' }
  ],
  customers: [
    { title: 'New Signups', value: 200 },
    { title: 'Active Users', value: 950 }
  ],
  reports: [
    { title: 'Monthly Report', value: 'Ready' },
    { title: 'Yearly Report', value: 'Pending' }
  ]
};

const sectionTitle = document.getElementById('section-title');
const cardsContainer = document.getElementById('cards-container');
const sidebarItems = document.querySelectorAll('.sidebar li');

function renderCards(section) {
  cardsContainer.innerHTML = '';
  data[section].forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<h3>${item.title}</h3><p>${item.value}</p>`;
    cardsContainer.appendChild(card);
  });
}

function setActive(section) {
  sectionTitle.textContent = section.charAt(0).toUpperCase() + section.slice(1);
  renderCards(section);
}

sidebarItems.forEach(li => {
  li.addEventListener('click', () => setActive(li.dataset.section));
});

setActive('overview');
</script>
</body>
</html>
